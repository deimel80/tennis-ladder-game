<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Court Clash</title>
  <meta name="description" content="Textbasiertes Tennis-Forderungsspiel mit Live-Matches, Rangliste und Supabase-Speicherung." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Court Clash</p>
      <h1>Court Clash</h1>
      <p class="subtitle">Fordere Spieler heraus. Gewinne Matches. Steig in der Rangliste.</p>
    </div>
    <div class="header-meta">
      <span id="versionBadge" class="version-badge">v0.7.1</span>
      <span id="connectionBadge" class="connection-badge pending">Prüfe Verbindung</span>
    </div>
  </header>

  <main id="app" class="app-shell">
    <section class="card loading-card">
      <div class="spinner" aria-hidden="true"></div>
      <div>
        <h2>Spiel wird geladen</h2>
        <p>Konfiguration und Rangliste werden vorbereitet.</p>
      </div>
    </section>
  </main>

  <template id="toastTemplate">
    <div class="toast"></div>
  </template>
  <div id="toastHost" class="toast-host" aria-live="polite" aria-atomic="true"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
